name: Build & Push Odoo Image to GHCR

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
    paths:
      # Solo rebuildar si cambia algo relevante para la imagen
      - 'Dockerfile'
      - 'requirements.txt'
      - 'addons/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:   # Permite trigger manual desde GitHub Actions UI

# ─── Permisos para GHCR ──────────────────────────────────────────────────────
permissions:
  contents: read
  packages: write   # Necesario para push a ghcr.io

# ─── Variables globales ───────────────────────────────────────────────────────
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pothoko/catastro_01

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Login a GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Extraer metadatos para el tag de la imagen
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag 'latest' en main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag con SHA corto del commit
            type=sha,prefix=sha-,format=short
            # Tag con fecha para rollback fácil
            type=raw,value={{date 'YYYYMMDD-HHmm'}}

      # 4. Configurar Docker Buildx (builder multi-plataforma, mejor cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build y push con cache de GitHub Actions
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache entre runs (reduce tiempo de build de ~8min a ~2min)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Plataforma linux/amd64 (compatible con WSL2 x64)
          platforms: linux/amd64

      # 6. Resumen del build en GitHub Actions UI
      - name: Image digest summary
        run: |
          echo "### ✅ Image built and pushed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`ghcr.io/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**To deploy in WSL catastro:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "cd /opt/catastro && docker compose pull && docker compose up -d" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
