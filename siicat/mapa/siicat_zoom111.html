<script language="JavaScript" type="text/javascript">
function knopfstatus(form)
{ 
 var a = form.zoomdir.value;
 with (document)
 { 
  if (form.mode.value == "query") butinfo.src='http://localhost/porco/graphics/icon_info2.png';
  else if (a == "0") butpan.src='http://localhost/porco/graphics/icon_recentre.png'; 
  else if (a == "-1") butzoomout.src='http://localhost/porco/graphics/icon_zoomout.png'; 
  else if (a == "1") butzoomin.src='http://localhost/porco/graphics/icon_zoomin.png'; 
  else butinfo.src='http://localhost/porco/graphics/icon_info.png'; 
  } 
 } 
 </script> 
<script language="JavaScript" type="text/javascript">
function kartengroesse()
{
 var kartenmasse = '600 600';
 var massarray = kartenmasse.split(' ');
 if (ns4)
 { 
  objContainer.width = massarray[0];
  objContainer.height = massarray[1];
 }
 else
 {
  objContainer.style.width = massarray[0] + 'px';
  objContainer.style.height = massarray[1] + 'px';
 }
}
 </script> 
 
<script language="JavaScript" type="text/javascript">
function bilddaten(img)
{
 if (ns4) return new fobjekt(img.x, img.y, 600, 600);
 else 
 {
  var canvas = new fobjekt(0, 0, 600, 600);
  while(img) 
  {
   canvas.x += img.offsetLeft;
   canvas.y += img.offsetTop;
   img = img.offsetParent;
  }
  return canvas;
 } 
}
 </script>
